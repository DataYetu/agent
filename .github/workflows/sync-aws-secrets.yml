name: Sync Agent Secrets (AWS)

# One-time / occasional: push runtime secrets from GitHub → AWS Secrets Manager.
# After this, deploy-prod.yml uses SKIP_SECRET_UPLOAD=1 and reads from AWS only.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upsert datayetu/prod/agent secret
        env:
          AGENT_SECRET_NAME: ${{ vars.AGENT_SECRET_NAME || 'datayetu/prod/agent' }}
          CROO_API_URL: ${{ secrets.CROO_API_URL }}
          CROO_WS_URL: ${{ secrets.CROO_WS_URL }}
          CROO_SDK_KEY: ${{ secrets.CROO_SDK_KEY }}
          CROO_SERVICE_ID: ${{ secrets.CROO_SERVICE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          PROVIDER_FUND_ADDRESS: ${{ secrets.PROVIDER_FUND_ADDRESS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          VALIDATOR_TIMEOUT_MS: ${{ vars.VALIDATOR_TIMEOUT_MS || '180000' }}
          SERVICE_PRICE: ${{ vars.SERVICE_PRICE || '0.05' }}
          SERVICE_CURRENCY: ${{ vars.SERVICE_CURRENCY || 'USDC' }}
          PORT: ${{ vars.AGENT_PORT || '3000' }}
          ENABLE_DEV_ENDPOINT: ${{ vars.ENABLE_DEV_ENDPOINT || 'false' }}
          BASE_RPC_URL: ${{ vars.BASE_RPC_URL || 'https://mainnet.base.org' }}
          LLM_FALLBACK_ENABLED: ${{ vars.LLM_FALLBACK_ENABLED || 'false' }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.openai.com/v1' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o-mini' }}
          LLM_FALLBACK_CONFIDENCE: ${{ vars.LLM_FALLBACK_CONFIDENCE || '0.65' }}
        run: |
          set -euo pipefail
          for key in CROO_API_URL CROO_WS_URL CROO_SDK_KEY CROO_SERVICE_ID TELEGRAM_BOT_TOKEN TELEGRAM_GROUP_ID; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing GitHub secret: $key"
              exit 1
            fi
          done

          SECRET_JSON="$(node -e '
            const o = {
              CROO_API_URL: process.env.CROO_API_URL,
              CROO_WS_URL: process.env.CROO_WS_URL,
              CROO_SDK_KEY: process.env.CROO_SDK_KEY,
              CROO_SERVICE_ID: process.env.CROO_SERVICE_ID,
              TELEGRAM_BOT_TOKEN: process.env.TELEGRAM_BOT_TOKEN,
              TELEGRAM_GROUP_ID: process.env.TELEGRAM_GROUP_ID,
              VALIDATOR_TIMEOUT_MS: process.env.VALIDATOR_TIMEOUT_MS,
              SERVICE_PRICE: process.env.SERVICE_PRICE,
              SERVICE_CURRENCY: process.env.SERVICE_CURRENCY,
              PORT: process.env.PORT,
              ENABLE_DEV_ENDPOINT: process.env.ENABLE_DEV_ENDPOINT,
              BASE_RPC_URL: process.env.BASE_RPC_URL,
              LLM_FALLBACK_ENABLED: process.env.LLM_FALLBACK_ENABLED || "false",
              LLM_BASE_URL: process.env.LLM_BASE_URL || "",
              LLM_API_KEY: process.env.LLM_API_KEY || "",
              LLM_MODEL: process.env.LLM_MODEL || "gpt-4o-mini",
              LLM_FALLBACK_CONFIDENCE: process.env.LLM_FALLBACK_CONFIDENCE || "0.65",
            };
            if (process.env.PROVIDER_FUND_ADDRESS) {
              o.PROVIDER_FUND_ADDRESS = process.env.PROVIDER_FUND_ADDRESS;
            }
            process.stdout.write(JSON.stringify(o));
          ')"

          REGION="${AWS_REGION:-us-east-1}"
          if aws secretsmanager describe-secret --secret-id "$AGENT_SECRET_NAME" --region "$REGION" >/dev/null 2>&1; then
            aws secretsmanager put-secret-value --secret-id "$AGENT_SECRET_NAME" --secret-string "$SECRET_JSON" --region "$REGION"
          else
            aws secretsmanager create-secret --name "$AGENT_SECRET_NAME" --secret-string "$SECRET_JSON" --region "$REGION"
          fi
          echo "Synced secret: $AGENT_SECRET_NAME"
